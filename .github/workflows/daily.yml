name: daily-radar

on:
  schedule:
    # 22:30 UTC = 北京时间次日 06:30（比 antibubble 早半小时，错开）
    - cron: "30 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: radar-state
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Materialize profile（从加密 Secret 还原私密画像，使云端也能个性化）
        env:
          PROFILE_YAML: ${{ secrets.PROFILE_YAML }}
        run: |
          if [ -n "$PROFILE_YAML" ]; then
            printf '%s' "$PROFILE_YAML" > profile.yaml
            echo "profile.yaml 已从 Secret 写入（个性化模式）"
          else
            echo "无 PROFILE_YAML Secret，使用通用模式"
          fi

      - name: Scan the radar
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          RSSHUB_BASE: ${{ secrets.RSSHUB_BASE }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: python -m src.main

      - name: Persist seen state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "chore: update seen state [skip ci]"
            git pull --rebase --autostash origin main
            git push
          fi
